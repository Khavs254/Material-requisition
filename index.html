<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ropa Material Requisition</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@500;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --navy:#14304F; --blue:#2E6DA4; --steel:#6B7785;
  --paper:#F5F2EA; --card:#FFFFFF; --ink:#1B1F24; --amber:#B8732A;
  --line:#DCD5C4; --danger:#A8392D; --good:#3C7A4D; --r:6px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  background-image:linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size:34px 34px; background-attachment:fixed;
  color:var(--ink); font-family:'Inter',system-ui,sans-serif; font-size:14px; line-height:1.4;
}
.f-num{font-family:'IBM Plex Mono',monospace;}

.topbar{position:sticky; top:0; z-index:50; background:var(--navy); color:#EAF1F8; display:flex; align-items:center; gap:16px; padding:10px 22px; border-bottom:3px solid var(--blue);}
.topbar h1{font-family:'Roboto Slab',serif; font-size:17px; font-weight:700; margin:0;}
.topbar small{display:block; font-size:11px; color:#AFC4D9; font-weight:400;}
.topbar .spacer{flex:1;}
.topbar .actions{display:flex; gap:8px; flex-wrap:wrap;}
.tb-btn{background:transparent; color:#EAF1F8; border:1px solid #3D5C7C; padding:7px 12px; border-radius:var(--r); cursor:pointer; font-family:'Inter',sans-serif; font-size:12.5px; font-weight:600; display:inline-flex; align-items:center; gap:6px;}
.tb-btn:hover{background:#1E4368; border-color:var(--blue);}
.tb-btn.primary{background:var(--blue); border-color:var(--blue);}
.tb-btn.primary:hover{background:#3878B0;}
.tb-btn.danger{border-color:#7A2E26;}
.tb-btn.danger:hover{background:#5C231D;}
input[type="file"]{display:none;}

/* ---------- Cloud sync UI ---------- */
.cloud-pill{position:relative; font-size:11.5px;}
.cloud-pill.cloud-ok{border-color:#3C7A4D; color:#A9E0B8;}
.cloud-pill.cloud-busy{border-color:var(--blue); color:#BBD8EE;}
.cloud-pill.cloud-warn{border-color:#C8862A; color:#F0CC97;}
.cloud-pill.cloud-off{border-color:#3D5C7C; color:#9FB6CC;}
.cloud-panel{
  position:fixed; top:58px; right:18px; width:min(360px, calc(100vw - 36px));
  z-index:80; background:#fff; color:var(--ink); border:1px solid var(--line);
  border-radius:8px; box-shadow:0 14px 40px rgba(20,48,79,.22); padding:14px;
}
.cloud-panel.hidden{display:none;}
.cp-section h3{font-family:'Roboto Slab',serif; font-size:13px; color:var(--navy); margin:0 0 8px; text-transform:uppercase; letter-spacing:.4px;}
.cp-row-between{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:10px;}
.cp-header-actions{display:flex; align-items:center; gap:8px;}
.cp-label{display:flex; flex-direction:column; gap:4px; font-size:11px; color:var(--steel); font-weight:700; text-transform:uppercase; margin:8px 0;}
.cp-label input{font-size:12.5px; text-transform:none; letter-spacing:0; font-weight:500;}
.cp-hint,.cp-empty{font-size:11.5px; color:var(--steel); margin:6px 0 10px;}
.cp-error{background:#FBEAE7; color:var(--danger); font-size:11.5px; padding:8px 10px; border-radius:5px; margin:8px 0;}
.cp-quote-list{display:flex; flex-direction:column; gap:6px; max-height:280px; overflow:auto; margin:8px 0;}
.cp-quote-row{display:flex; align-items:center; gap:6px; border:1px solid var(--line); border-radius:6px; padding:5px; background:#FCFBF8;}
.cp-quote-row.active{border-color:var(--blue); background:#F3F7FB;}
.cp-quote-open{flex:1; display:flex; flex-direction:column; align-items:flex-start; gap:1px; background:none; border:none; padding:2px; cursor:pointer; text-align:left; color:var(--ink);}
.cp-qtitle{font-weight:700; font-size:12px;}
.cp-qdate{font-size:10.5px; color:var(--steel);}
.cp-synced{font-size:10.5px; color:var(--steel); text-align:right; margin-top:4px;}

.shell{max-width:1280px; margin:0 auto; padding:22px 18px 90px;}
.hint-banner{background:#FBF3E3; border:1px solid #E8D3A4; color:#6B4F1B; padding:10px 14px; border-radius:var(--r); font-size:12.5px; margin-bottom:18px;}

.card{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:18px 20px; margin-bottom:18px; box-shadow:0 1px 2px rgba(20,48,79,.05);}
.card-head{display:flex; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap;}
.card-head h2{font-family:'Roboto Slab',serif; font-size:14px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--navy); margin:0;}
.card-head .pitch{font-size:12px; color:var(--steel); flex:1;}

.meta-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:12px 16px;}
.meta-grid label{display:flex; flex-direction:column; gap:4px; font-size:11.5px; font-weight:600; color:var(--steel); text-transform:uppercase; letter-spacing:.3px;}
input.f-text, input.f-num, select.f-select, input[type="date"], textarea.f-text{
  border:none; border-bottom:1.5px solid var(--line); background:transparent;
  padding:9px 4px; font-size:14.5px; color:var(--ink); width:100%; border-radius:0; min-height:34px; font-family:inherit;
}
input.f-text:focus, input.f-num:focus, select.f-select:focus, input[type="date"]:focus, textarea.f-text:focus{outline:none; border-bottom-color:var(--blue); background:rgba(33,107,212,0.06);}
.f-num{text-align:right;}

.group-block{border:1px solid var(--line); border-radius:var(--r); padding:12px 14px; background:#FCFBF8; margin-bottom:14px;}
.group-head{display:flex; align-items:center; gap:10px; margin-bottom:8px; flex-wrap:wrap;}
.group-name{font-family:'Roboto Slab',serif; font-weight:700; font-size:13px; text-transform:uppercase; letter-spacing:.4px; color:var(--navy); border-bottom-color:var(--navy)!important; max-width:320px;}
.spacer{flex:1;}

table.items-table{width:100%; border-collapse:collapse; font-size:12.5px;}
.items-table th{text-align:left; font-size:9.7px; text-transform:uppercase; letter-spacing:.3px; color:var(--steel); font-weight:700; padding:4px 5px; border-bottom:1.5px solid var(--line); border-right:1px solid var(--line); white-space:nowrap;}
.items-table th:last-child, .items-table td:last-child{border-right:none;}
.items-table td{padding:4px 5px; border-bottom:1px solid #EFEAE0; vertical-align:middle; border-right:1px solid #EFEAE0;}
.items-table .num-col{width:24px; color:var(--steel); font-family:'IBM Plex Mono',monospace; text-align:center;}
.items-table .desc-col{min-width:170px;}
.items-table input{font-size:12.5px; padding:5px 3px; min-height:28px;}
.col-sm{width:62px;}
.col-md{width:80px;}
.col-unit{width:50px;}
.readout-cell{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--navy); font-weight:600; text-align:right; white-space:nowrap;}
.rm-col{width:30px; text-align:center;}
.btn-icon{border:none; background:transparent; color:var(--danger); cursor:pointer; font-size:14px; padding:2px 4px;}
.btn-icon:hover{color:#fff; background:var(--danger); border-radius:3px;}

.btn{border:1px solid var(--line); background:#fff; color:var(--ink); padding:7px 12px; border-radius:var(--r); cursor:pointer; font-size:12px; font-weight:600; font-family:inherit;}
.btn:hover{border-color:var(--blue); color:var(--blue);}
.btn-add{color:var(--good); border-color:#bcd9c4;}
.btn-add:hover{background:#EAF5ED;}
.btn-ghost{border:none; background:transparent; color:var(--steel); font-size:11.5px; cursor:pointer; text-decoration:underline;}

.sum-row td{font-weight:700; background:#F8F6F0; border-bottom:none;}
.group-total{text-align:right; font-family:'IBM Plex Mono',monospace; color:var(--navy);}

.paint-row-grid{display:grid; grid-template-columns:1.4fr 1fr .8fr; gap:10px; margin-bottom:8px;}
.coat-block{border:1px solid var(--line); border-radius:4px; padding:8px; background:#fff;}
.coat-block h4{margin:0 0 6px; font-size:10.5px; text-transform:uppercase; color:var(--steel); letter-spacing:.3px;}
.coat-fields{display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px;}
.coat-fields label{font-size:9.5px; color:var(--steel); font-weight:600; display:block; margin-bottom:2px;}
.paint-readouts{display:flex; gap:14px; margin-top:6px; font-size:11px; color:var(--steel); flex-wrap:wrap;}
.paint-readouts b{color:var(--navy); font-family:'IBM Plex Mono',monospace;}

.empty-row{color:#A39B86; font-style:italic; text-align:center; padding:14px;}

.table-scroll{width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch;}
.table-scroll table.items-table{min-width:760px;}

/* ---------------- MOBILE ---------------- */
@media (max-width:760px){
  .shell{padding:14px 10px 80px;}
  .topbar{padding:8px 12px; gap:8px; flex-wrap:wrap;}
  .topbar h1{font-size:14.5px;}
  .topbar small{font-size:10px;}
  .topbar .actions{width:100%; gap:6px;}
  .tb-btn{padding:8px 10px; font-size:12px; flex:1 1 auto; justify-content:center;}
  .cloud-pill{flex:1 1 100%; order:5;}

  .card{padding:13px 12px; margin-bottom:14px;}
  .card-head{gap:8px;}
  .card-head h2{font-size:13px;}
  .card-head .pitch{flex-basis:100%; order:3; font-size:11.5px;}
  .card-head button{flex:1 1 auto;}

  .meta-grid{grid-template-columns:1fr 1fr; gap:10px 12px;}
  input.f-text, input.f-num, select.f-select, input[type="date"]{font-size:16px; min-height:40px; padding:9px 4px;}

  .group-head{gap:8px;}
  .group-name{max-width:100%; flex:1 1 100%; order:1;}
  .group-head button{flex:1 1 auto; order:2;}

  table.items-table{min-width:820px;}
  .items-table th, .items-table td{padding:6px 6px;}
  .items-table input, .items-table select{font-size:13px; min-height:34px;}
  .rm-col{width:38px;}
  .btn-icon{font-size:18px; padding:6px 8px;}

  .paint-row-grid{grid-template-columns:1fr;}
  .coat-fields{grid-template-columns:1fr 1fr;}

  .inline-chk{flex-basis:100%;}
}

/* ---------------- PRINT ---------------- */
#printArea{display:none;}
/* ---------- Import modal + installer requisition ---------- */
.modal-back{position:fixed; inset:0; background:rgba(20,48,79,.55); z-index:200; display:flex; align-items:flex-start; justify-content:center; padding:30px 14px; overflow:auto;}
.modal-back.hidden{display:none;}
.modal{background:var(--card); border:1px solid var(--line); border-radius:var(--r); width:100%; max-width:1120px; box-shadow:0 10px 40px rgba(0,0,0,.3);}
.modal-head{display:flex; align-items:center; gap:12px; padding:14px 18px; border-bottom:1px solid var(--line);}
.modal-head h2{font-family:'Roboto Slab',serif; font-size:16px; margin:0; color:var(--navy);}
.modal-head .spacer{flex:1;}
.modal-body{padding:14px 18px; max-height:60vh; overflow:auto;}
.modal-foot{display:flex; align-items:center; gap:8px; padding:12px 18px; border-top:1px solid var(--line); flex-wrap:wrap;}
.modal-foot .spacer{flex:1;}
.imp-note{font-size:11.5px; color:var(--steel); margin:0 0 10px;}
.imp-table{width:100%; border-collapse:collapse; font-size:12px;}
.imp-table th{background:#F0EEE6; border:1px solid var(--line); padding:5px 6px; text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.4px; color:var(--steel);}
.imp-table td{border:1px solid var(--line); padding:3px 6px;}
.imp-table td.n{text-align:right; font-family:'IBM Plex Mono',monospace;}
.imp-table tr.off{opacity:.42;}
.imp-summary{font-size:12px; color:var(--navy); font-weight:600; margin-top:10px;}
.imp-drop{border:2px dashed var(--line); border-radius:var(--r); padding:16px; text-align:center; color:var(--steel); font-size:12.5px; margin-bottom:12px;}
.imp-drop.hot{border-color:var(--blue); background:#EFF5FB; color:var(--navy);}
.imp-tabs{display:flex; gap:4px; border-bottom:1px solid var(--line); margin-bottom:16px;}
.imp-tab{padding:9px 16px; font-size:12.5px; font-weight:600; color:var(--steel); background:none; border:none; border-bottom:2px solid transparent; cursor:pointer; font-family:inherit;}
.imp-tab.active{color:var(--navy); border-bottom-color:var(--blue);}
.imp-tab:hover{color:var(--navy);}
.imp-pane{display:none;}
.imp-pane.active{display:block;}
.imp-picker-drop{border:2px dashed var(--line); border-radius:var(--r); padding:36px 20px; text-align:center; cursor:pointer; transition:border-color .15s, background .15s;}
.imp-picker-drop:hover, .imp-picker-drop.hot{border-color:var(--blue); background:#EFF5FB;}
.imp-picker-drop .imp-icon{font-size:30px; margin-bottom:8px;}
.imp-picker-drop .imp-title{font-weight:700; color:var(--navy); font-size:13.5px; margin-bottom:4px;}
.imp-picker-drop .imp-sub{font-size:11.5px; color:var(--steel);}
.imp-col-hint{margin-top:14px; font-size:11.5px; color:var(--steel); background:#FAF8F2; border:1px solid var(--line); border-radius:var(--r); padding:10px 12px;}
.imp-col-hint code{background:#F0EEE6; padding:1px 5px; border-radius:3px; font-family:'IBM Plex Mono',monospace;}
/* ---------- Top-level tabs ---------- */
.app-tabs{display:flex; gap:4px; margin:0 0 16px;}
.app-tab{padding:9px 18px; font-size:13px; font-weight:700; color:var(--steel); background:var(--card); border:1px solid var(--line); border-bottom:none; border-radius:var(--r) var(--r) 0 0; cursor:pointer; font-family:'Inter',sans-serif;}
.app-tab.active{color:var(--navy); background:#fff; box-shadow:0 -2px 0 var(--blue) inset;}
/* ---------- Row highlight color swatch ---------- */
.row-color-cell{text-align:center; padding:2px !important;}
.row-color-swatch{width:22px; height:22px; padding:0; border:1px solid var(--line); border-radius:4px; cursor:pointer; background:transparent;}
.row-color-clear{border:none; background:none; color:var(--steel); font-size:10px; cursor:pointer; display:block; margin:2px auto 0; text-decoration:underline;}
/* ---------- Counter Check ---------- */
.cc-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:18px;}
@media (max-width:800px){ .cc-grid{grid-template-columns:1fr;} }
.cc-side{border:1px solid var(--line); border-radius:var(--r); padding:16px; background:#FAF8F2;}
.cc-side h3{margin:0 0 4px; font-family:'Roboto Slab',serif; font-size:14px; color:var(--navy);}
.cc-side .cc-sub{font-size:11.5px; color:var(--steel); margin-bottom:10px;}
.cc-stat{font-size:12.5px; color:var(--navy); margin-top:8px;}
.cc-stat b{font-family:'IBM Plex Mono',monospace;}
.cc-table{width:100%; border-collapse:collapse; font-size:12px; margin-top:6px;}
.cc-table th{background:#F0EEE6; border:1px solid var(--line); padding:6px 7px; text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.3px; color:var(--steel);}
.cc-table td{border:1px solid var(--line); padding:5px 7px; vertical-align:top;}
.cc-table td.n{text-align:right; font-family:'IBM Plex Mono',monospace;}
.cc-badge{display:inline-block; padding:2px 8px; border-radius:10px; font-size:10.5px; font-weight:700;}
.cc-badge.ok{background:#E3F3E6; color:#1E7A34;}
.cc-badge.warn{background:#FDEFDC; color:#A05A00;}
.cc-badge.bad{background:#FBE3E3; color:#B3271E;}
.cc-badge.only{background:#EAECEF; color:var(--steel);}
.cc-src{font-size:10.5px; color:var(--steel); display:block; margin-top:2px;}
.ins-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:10px 14px; margin-bottom:12px;}
.ins-grid label{display:flex; flex-direction:column; gap:3px; font-size:10.5px; font-weight:600; color:var(--steel); text-transform:uppercase; letter-spacing:.3px;}
.ins-summary{margin-top:10px; border:1px solid var(--line); border-radius:var(--r); overflow:hidden;}
.ins-summary .row{display:flex; justify-content:space-between; padding:6px 12px; font-size:13px; border-bottom:1px solid #EEE9DC;}
.ins-summary .row:last-child{border-bottom:none;}
.ins-summary .row b{font-family:'IBM Plex Mono',monospace;}
.ins-summary .row.net{background:#14304F; color:#EAF1F8; font-weight:700;}
.ins-summary .row.sub{background:#FAF8F2;}
.pct-chip{display:inline-block; min-width:52px; text-align:right; font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:600; color:var(--navy);}
tr.no-print-row, .group-block.no-print-row{opacity:.4;}
tr.no-print-row input, tr.no-print-row select, .group-block.no-print-row input, .group-block.no-print-row select{background:#F4F2EC;}

@media print{
  body{background:#fff !important; font-size:11pt;}
  .topbar, .shell{display:none !important;}
  #printArea{display:block !important;}
  .print-page{width:100%; padding:0 6mm; page-break-after:always; background:#fff; font-family:Arial,Helvetica,sans-serif; color:#111;}
  .print-page:last-child{page-break-after:auto;}
  .p-letterhead{display:flex; align-items:center; gap:14px; padding-bottom:8px; border-bottom:2px solid #14304F; margin-bottom:10px;}
  .p-firm-name{font-family:Georgia,'Times New Roman',serif; font-size:15pt; font-weight:700; color:#14304F;}
  .p-firm-line{font-size:9pt; color:#555; margin-top:1px;}
  .p-doctitle{text-align:right; padding-top:2px;}
  .p-doclabel{font-family:Georgia,serif; font-size:13pt; font-weight:700; letter-spacing:1px; color:#14304F;}
  .p-docmeta{font-size:9pt; color:#444; margin-top:2px;}
  .p-projblock{padding:8px 0 10px; border-bottom:1px solid #ccc; margin-bottom:10px;}
  .p-projblock div{font-size:10.5pt; margin-bottom:2px;}
  .p-projblock b{color:#14304F;}
  .p-section-title{font-family:Georgia,serif; font-weight:700; font-size:11.5pt; color:#14304F; margin:14px 0 6px; border-bottom:1px solid #14304F; padding-bottom:2px;}
  table.p-table{width:100%; border-collapse:collapse; font-size:8.6pt; margin-bottom:8px;}
  .p-table th, .p-table td{border:1px solid #999; padding:3px 4px;}
  .p-table thead th{background:#EEF3F8; font-size:7.8pt; text-transform:uppercase; text-align:center;}
  .p-no{text-align:center; width:20px;}
  .p-desc{text-align:left;}
  .p-num{text-align:right; white-space:nowrap;}
  .p-unit{text-align:center; width:32px;}
  .p-grouphead td{background:#14304F; color:#fff; font-weight:700; padding:3px 6px; letter-spacing:.4px; font-size:8.5pt;}
  .p-grouphead{page-break-after:avoid;}
  tr{page-break-inside:avoid;}
  .p-sumrow td{background:#F5F2EA; font-weight:700; color:#14304F;}
  .p-sig-row{display:flex; justify-content:flex-start; margin-top:30px; gap:10px;}
  .p-sig-col{width:23%; font-size:9pt;}
  .p-sig-line{border-top:1px solid #333; margin-top:30px; padding-top:3px;}
  .p-sig-img{height:40px; display:block; margin-bottom:-8px;}
  .p-foot{font-size:8pt; color:#777; margin-top:14px; text-align:center;}
  .p-paybox{margin-top:10px; border:1px solid #333;}
  .p-paybox .pr{display:flex; justify-content:space-between; padding:3px 8px; border-bottom:1px solid #BBB; font-size:9pt;}
  .p-paybox .pr:last-child{border-bottom:none;}
  .p-paybox .pr.net{background:#EEE; font-weight:700;}
  .p-nb{margin-top:8px; font-size:8.5pt; font-style:italic;}
  .p-sig-two{display:flex; gap:40px; margin-top:26px;}
  .p-sig-two .p-sig-col{flex:1;}
  .modal-back{display:none !important;}
}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>ROPA MATERIAL REQUISITION</h1>
    <small>Structural steel &amp; paint procurement</small>
  </div>
  <div class="spacer"></div>
  <div class="actions">
    <button class="tb-btn" data-action="new">+ New</button>
    <button class="tb-btn" data-action="open-import" title="Import a Tekla Structures material list from Excel/CSV or Word/Report">📥 Import Material List</button>
    <button class="tb-btn" data-action="export">⬇ Export JSON</button>
    <button class="tb-btn" data-action="export-xlsx">⬇ Export Excel</button>
    <label class="tb-btn" for="importFile">⬆ Import JSON</label>
    <input type="file" id="importFile" accept="application/json">
    <button class="tb-btn" data-action="print-installer">🖨 Installer Req</button>
    <button class="tb-btn primary" data-action="print">🖨 Print Requisition</button>
    <span id="cloudPill"></span>
  <div id="cloudPanel" class="cloud-panel hidden"></div>
  </div>
</div>

<div class="shell" id="shell"></div>

<div id="importModal" class="modal-back hidden"></div>
<div id="ccMapModal" class="modal-back hidden"></div>

<div id="printArea"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
/* ============================ STATE ============================ */
const DENSITY = 7850;

function uid(){ return 'r'+Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4); }
function uuid(){
  if(window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{ const r=Math.random()*16|0, v=c==='x'?r:(r&0x3|0x8); return v.toString(16); });
}
function todayISO(){ return new Date().toISOString().slice(0,10); }
function esc(s){ return (s===undefined||s===null)?'':String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function num(v){ const n=parseFloat(v); return isFinite(n)?n:0; }
function fmt(n,d){ d=d===undefined?2:d; if(!isFinite(n))return '0'; return n.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:d}); }
function ceilSafe(n){ return n>0? Math.ceil(n-1e-9):0; }
function roundSafe(n){ return n>0? Math.round(n):0; }
function round4(n){ return Math.round(n*10000)/10000; }
function normUnit(u){
  const v = String(u||'').trim();
  const found = UNITS.find(x=>x.toLowerCase()===v.toLowerCase());
  if(found) return found;
  if(v.toLowerCase()==='pcs' || v.toLowerCase()==='pieces') return 'No';
  if(v.toLowerCase()==='kgs') return 'Kg';
  if(v.toLowerCase()==='sm' || v.toLowerCase()==='sqm') return 'Sm';
  return v || 'No';
}
function unitOptions(selected){
  const val = normUnit(selected);
  const opts = UNITS.includes(val) ? UNITS : [val].concat(UNITS);
  return opts.map(u=>'<option value="'+esc(u)+'" '+(u===val?'selected':'')+'>'+esc(u)+'</option>').join('');
}
function catalogCategories(){ return Object.keys(CATALOG).filter(k=>CATALOG[k] && CATALOG[k].items && CATALOG[k].items.length); }
function catalogItem(row){ const cat = CATALOG[row.category]; return cat && cat.items ? cat.items[num(row.sizeIdx)] : null; }
function catalogLabel(row){
  const item = catalogItem(row);
  if(!item) return row.profile || '';
  const label=(item.label||row.category||'').trim(); const size=(item.size||'').replace(new RegExp('^'+label+'\\s*','i'),'').trim(); const th=item.t?('x'+item.t):''; return (label?label+' ':'')+size+th+(item.kgPerM ? ' ('+fmt(item.kgPerM,3)+' kg/m)' : item.kgPerPc ? ' ('+fmt(item.kgPerPc,1)+' kg/pc)' : '');
}
function plateThicknessFromText(text){ const m=String(text||'').match(/x\s*([0-9.]+)\s*mm/i) || String(text||'').match(/([0-9.]+)\s*mm/i); return m?num(m[1]):0; }

    kgPerM:'', plateL:'1220', plateW:'2440', plateT:'', unitOrderMass:'', platePiecesNeeded:0, plateOrderPieces:0
  }, over||{});

function blankGeneralRow(){ return { id:uid(), desc:'', qty:'', unit:'No', remarks:'', print:true, color:'' }; }
function blankGeneralGroup(name){ return { id:uid(), name:name||'GENERAL ITEMS', rows:[blankGeneralRow()] }; }

function defaultState(){

}
function migrateState(s){
  if(!s || !s.meta) return defaultState();
  if(!s.id) s.id = uuid();
  if(s.meta.printStock===undefined) s.meta.printStock = false;
  if(s.meta.printElementCols===undefined) s.meta.printElementCols = true;
  (s.materialGroups||[]).forEach(g=>{
    if(!g.id) g.id = uid();
    (g.rows||[]).forEach(r=>{
      if(!r.id) r.id = uid();
      if(r.print===undefined) r.print = true;
      if(r.color===undefined) r.color = '';
      if(!r.kind) r.kind = /plate/i.test((r.profile||'')+' '+(g.name||'')) ? 'plate' : 'section';
      if(!r.mode) r.mode = 'custom';
      r.unit = normUnit(r.unit || (r.kind==='plate'?'No':'No'));
      if(r.avail==='-') r.avail='';
      if(!r.category) r.category = r.kind==='plate' ? 'plates' : 'UB';
      if(r.sizeIdx===undefined) r.sizeIdx = 0;
      if(!r.plateL) r.plateL = '1220';
      if(!r.plateW) r.plateW = '2440';
      if(!r.plateT) r.plateT = plateThicknessFromText(r.profile) || '';
      if(r.unitOrderMass===undefined) r.unitOrderMass = '';
      if(r.kind==='section'){
        if(!r.stdLength) r.stdLength = '6';
        if(!r.unitLength) r.unitLength = '';
        if(!r.totalLength && r.nos && r.unitLength){
          r.totalLength = String(round4(num(r.nos) * num(r.unitLength)));
        }
        if(!r.totalLength && r.qty) r.totalLength = String(round4(num(r.qty) * num(r.unitLength)));
      }
      if(r.kind==='plate'){
        // Old data had qty as pieces. Migrate to mass if not present.
        if(!r.mass && r.qty){
          const kgPc = plateUnitMass(r);
          if(kgPc) r.mass = String(round4(num(r.qty) * kgPc));
        }
      }
    });
  });
  if(!s.materialGroups || !s.materialGroups.length) s.materialGroups = [blankGroup('ANGLE SECTION')];
  if(!s.paintRows) s.paintRows = [];
  s.paintRows.forEach(p=>{
    if(!p.id) p.id = uid();
    if(p.print===undefined) p.print = true;
    if(p.color===undefined) p.color = '';
    if(!p.coats){
      // migrate legacy primer/coat1/coat2 structure to dynamic coats array
      const legacy = [];
      if(p.primer) legacy.push(blankPaintCoat('Primer', p.primer.type, num(p.primer.spread)||10, num(p.primer.can)||20, true));
      if(p.coat1) legacy.push(blankPaintCoat('1st Coat', p.coat1.type, num(p.coat1.spread)||10, num(p.coat1.can)||4, true));
      if(p.coat2) legacy.push(blankPaintCoat('2nd Coat', p.coat2.type, num(p.coat2.spread)||10, num(p.coat2.can)||4, !!p.twoCoat));
      p.coats = legacy.length ? legacy : [blankPaintCoat('Primer','',10,20,true), blankPaintCoat('1st Coat','',10,4,true)];
      delete p.primer; delete p.coat1; delete p.coat2; delete p.twoCoat;
    }
    p.coats.forEach(c=>{ if(!c.id) c.id = uid(); if(c.enabled===undefined) c.enabled = true; });
  });
  if(!s.generalGroups || !s.generalGroups.length) s.generalGroups = [blankGeneralGroup('GENERAL ITEMS')];
  s.generalGroups.forEach(g=>{ if(!g.id) g.id=uid(); (g.rows||[]).forEach(r=>{ if(!r.id) r.id=uid(); if(!r.unit) r.unit='No'; if(r.print===undefined) r.print=true; if(r.color===undefined) r.color=''; }); if(!g.rows||!g.rows.length) g.rows=[blankGeneralRow()]; });
  if(!s.installer) s.installer = blankInstaller();
  else {
    const ins = s.installer, def = blankInstaller();
    Object.keys(def).forEach(k=>{ if(ins[k]===undefined) ins[k]=def[k]; });
    if(!ins.items || !ins.items.length) ins.items = [blankInstallerItem()];
    ins.items.forEach(r=>{ if(!r.id) r.id=uid(); if(!r.unit) r.unit='SM'; if(r.print===undefined) r.print=true; if(r.color===undefined) r.color=''; });
    if(!ins.deductions) ins.deductions = [];
    ins.deductions.forEach(r=>{ if(!r.id) r.id=uid(); if(r.print===undefined) r.print=true; if(r.color===undefined) r.color=''; });
  }
  if(!s.activeTab) s.activeTab = 'requisition';
  if(!s.counterCheck) s.counterCheck = { quote: blankCounterCheckSide(), tekla: blankCounterCheckSide() };
  else {
    ['quote','tekla'].forEach(side=>{
      let sd = s.counterCheck[side];
      if(!sd){ s.counterCheck[side] = blankCounterCheckSide(); return; }
      if(!Array.isArray(sd.imports)){
        // migrate from the old single {source, rows} shape
        const imports = (sd.source && sd.rows && sd.rows.length) ? [{ id:uid(), source:sd.source, rows:sd.rows }] : [];
        s.counterCheck[side] = { imports };
      } else {
        sd.imports.forEach(im=>{ if(!im.id) im.id=uid(); if(!im.rows) im.rows=[]; });
      }
    });
  }
  return s;
}
function loadState(){
  try{
    const raw = localStorage.getItem(LS_KEY) || localStorage.getItem(OLD_LS_KEY);
    return raw ? migrateState(JSON.parse(raw)) : null;
  }catch(e){ return null; }
}
let state = loadState() || defaultState();
function localCacheKey(id){ return 'ropa_requisition_cloud_cache_'+id; }
function saveState(){
  recalcAllMaterials();
  try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){}
  if(cloud && cloud.client){
    try{ localStorage.setItem(localCacheKey(state.id), JSON.stringify(state)); }catch(e){}
    queueCloudSave();
  }
}

/* ============================ MATERIAL CALC ============================ */
function rowDesc(r){ return r.mode==='catalog' ? catalogLabel(r) : (r.profile || ''); }
function plateKgPerPc(L,W,T){ return (num(L)/1000)*(num(W)/1000)*(num(T)/1000)*DENSITY; }
function plateUnitMass(r){
  if(num(r.unitOrderMass)) return num(r.unitOrderMass);
  if(r.mode==='catalog'){ const it=catalogItem(r); if(it && num(it.kgPerPc)) return num(it.kgPerPc); }
  return plateKgPerPc(r.plateL,r.plateW,r.plateT);
}
function syncCatalogRow(r){
  const item = catalogItem(r);
  if(r.kind==='plate'){
    if(r.mode==='catalog' && item){
      r.profile = item.size;
      const m = String(item.size).match(/([0-9.]+)x([0-9.]+)x([0-9.]+)mm/i);
      if(m){ r.plateL=m[1]; r.plateW=m[2]; r.plateT=m[3]; }
      else if(!r.plateT) r.plateT = plateThicknessFromText(item.size) || '';
    }
    r.unit = normUnit(r.unit || 'No');
    return;
  }
  if(r.mode==='catalog' && item){
    r.profile = item.size;
    if(item.kgPerM) r.kgPerM = item.kgPerM;
  }
  r.unit = normUnit(r.unit || 'No');
}
function rowRequiredRaw(r){
  syncCatalogRow(r);

function recalcAllMaterials(){
  const plateBuckets = {};
  state.materialGroups.forEach(g=>g.rows.forEach(r=>{
    syncCatalogRow(r);
    if(r.kind==='section'){
      const nos = num(r.nos);
      const unitLength = num(r.unitLength);
      const totalLength = round4(nos * unitLength);
      const stdLength = num(r.stdLength) || 6;
      const bars = totalLength ? ceilSafe(totalLength / stdLength) : 0;
      const order = Math.max(bars - num(r.avail), 0);
      r.totalLength = totalLength ? String(totalLength) : '';
      r.qty = r.nos;
      r.barsToOrder = bars ? String(bars) : '';
      r.orderQty = order ? String(order) : '';
      if(totalLength && num(r.kgPerM)) r.mass = round4(totalLength * num(r.kgPerM));
      else r.mass = '';
    } else {
      const pcs = num(r.nos);
      const kgPc = plateUnitMass(r);
      const mass = kgPc ? round4(pcs * kgPc) : 0;
      r.mass = mass ? String(mass) : '';
      r.qty = pcs ? String(pcs) : '';
      r.platePiecesNeeded = pcs;
      const key = String(num(r.plateT) || plateThicknessFromText(rowDesc(r)) || rowDesc(r)).trim();
      if(!plateBuckets[key]) plateBuckets[key] = { rows:[], total:0, avail:0 };
      plateBuckets[key].rows.push(r);
      plateBuckets[key].total += pcs;
      plateBuckets[key].avail += num(r.avail);
    }
  }));
  Object.keys(plateBuckets).forEach(k=>{
    const b = plateBuckets[k];
    const toOrder = ceilSafe(Math.max(b.total - b.avail, 0));
    let remaining = toOrder;
    b.rows.forEach((r,idx)=>{
      if(idx===b.rows.length-1){ r.orderQty = remaining ? String(remaining) : ''; r.plateOrderPieces = remaining; }
      else { r.orderQty = ''; r.plateOrderPieces = 0; }
    });
  });
}

function paintRowCalc(p){

    const req = (c.enabled && c.type) ? area/Math.max(num(c.spread),0.0001)*wf : 0;
    return { id:c.id, label:c.label, type:c.type, can:c.can, req };
  });
  const total = coats.reduce((s,c)=>s+c.req,0);
  return { coats, total };
}
function paintProcurementRows(printOnly){

    const itemName = (p.item||'').trim() || 'Unnamed item';
    c.coats.forEach(coat=>{

      const key = itemName+'|'+coat.label+'|'+coat.type+'|'+coat.can;

function captureFocus(){

    if(tr) info.sel = 'tr[data-group="'+tr.dataset.group+'"][data-row="'+tr.dataset.row+'"] [data-field="'+el.dataset.field+'"]';

  } else if(el.dataset.paint && el.dataset.pfield){

  } else if(el.dataset.ins){
    info.sel = '[data-ins="'+el.dataset.ins+'"]';
  } else if(el.dataset.ifield){
    const tr = el.closest('tr[data-irow]');
    if(tr) info.sel = 'tr[data-irow="'+tr.dataset.irow+'"] [data-ifield="'+el.dataset.ifield+'"]';
  } else if(el.dataset.dfield){
    const tr = el.closest('tr[data-drow]');
    if(tr) info.sel = 'tr[data-drow="'+tr.dataset.drow+'"] [data-dfield="'+el.dataset.dfield+'"]';
  }
  return info.sel ? info : null;
}
function restoreFocus(info){
  if(!info || !info.sel) return;
  try{
    const el = document.querySelector(info.sel);

}

function installerCalc(printOnly){
  const ins = state.installer || blankInstaller();
  const srcItems = printOnly ? (ins.items||[]).filter(r=>r.print!==false) : (ins.items||[]);
  const items = srcItems.map(r=>{
    const totalQty=num(r.totalQty), qtyDone=num(r.qtyDone), rate=num(r.rate);
    return {
      id:r.id, desc:r.desc, unit:r.unit, totalQty, qtyDone, rate,
      contractValue: totalQty*rate,
      valueDone: qtyDone*rate,
      pct: totalQty ? (qtyDone/totalQty*100) : 0
    };
  });
  const totalContractValue = items.reduce((s,r)=>s+r.contractValue,0);
  const totalValueDone = items.reduce((s,r)=>s+r.valueDone,0);
  const measurable = items.filter(r=>r.totalQty>0);
  const overallPct = totalContractValue
    ? (totalValueDone/totalContractValue*100)
    : (measurable.length ? measurable.reduce((s,r)=>s+r.pct,0)/measurable.length : 0);
  const contractAmount = num(ins.contractAmount);
  const gross = ins.basis==='contract' ? contractAmount*overallPct/100 : totalValueDone;
  const retentionPct = num(ins.retentionPct);
  const retention = gross*retentionPct/100;
  const deductions = (printOnly ? (ins.deductions||[]).filter(d=>d.print!==false) : (ins.deductions||[])).reduce((s,d)=>s+num(d.amount),0);
  const net = gross - retention - deductions;
  return { items, totalContractValue, totalValueDone, overallPct, contractAmount, gross, retentionPct, retention, deductions, net };
}

const importUI = { open:false, stage:'picker', tab:'excel', rows:[], source:'', project:'', phase:'', mode:'append', error:'', plateMode:'pool', profileMode:'group' };

function teklaFamily(profile){
  const p = String(profile||'').trim().toUpperCase();
  if(/^(PLT|PL)\s*\d/.test(p) || /^PLATE/.test(p)) return { key:'PLATES', label:'PLATES', kind:'plate' };
  if(/^FL\s*\d/.test(p) || /^FLAT/.test(p)) return { key:'FLATS', label:'FLAT BARS / PLATES', kind:'plate' };
  if(/^IPE/.test(p)) return { key:'IPE', label:'IPE SECTIONS', kind:'section' };
  if(/^(UB|UKB)/.test(p)) return { key:'UB', label:'UB SECTIONS', kind:'section' };
  if(/^(UC|UKC)/.test(p)) return { key:'UC', label:'UC SECTIONS', kind:'section' };
  if(/^(HEA|HEB|HEM)/.test(p)) return { key:'HE', label:'HE SECTIONS', kind:'section' };
  if(/^CHS/.test(p) || /^(D|O)?\d+(\.\d+)?\s*X\s*\d+(\.\d+)?\s*CHS/.test(p)) return { key:'CHS', label:'CHS SECTIONS', kind:'section' };
  if(/^SHS/.test(p)) return { key:'SHS', label:'SHS SECTIONS', kind:'section' };
  if(/^RHS/.test(p)) return { key:'RHS', label:'RHS SECTIONS', kind:'section' };
  if(/^(L|A)\s*\d/.test(p) || /^ANGLE/.test(p)) return { key:'ANGLE', label:'ANGLE SECTIONS', kind:'section' };
  if(/^(CFLZ|CFZ|ZED)/.test(p) || /^Z\s*\d/.test(p)) return { key:'ZED', label:'ZED PURLINS', kind:'section' };
  if(/^(CFLC|CFC|CLC)/.test(p)) return { key:'CFLC', label:'C PURLINS (COLD FORMED)', kind:'section' };
  if(/^(PFC|C|U)\s*\d/.test(p) || /^CHANNEL/.test(p)) return { key:'CHANNEL', label:'CHANNEL SECTIONS', kind:'section' };
  if(/^(RB|ROD|RO|ROUND|DIA)/.test(p)) return { key:'RB', label:'ROUND BARS', kind:'section' };
  if(/GUTTER|FLASH|SHEET|DECK|CLAD/.test(p)) return { key:'FAB', label:'FABRICATED / SHEET ITEMS', kind:'section' };
  return { key:'OTHER', label:'OTHER SECTIONS', kind:'section' };
}
function plateDimsFromProfile(profile){
  // PLT10*170  |  PL6*170  |  FL10*80  |  PLT 10 x 170
  const m = String(profile||'').match(/^(?:PLT|PL|FL)\s*([0-9.]+)\s*[*xX]\s*([0-9.]+)/i);
  if(m) return { t:num(m[1]), w:num(m[2]) };
  return { t:plateThicknessFromText(profile), w:0 };
}
function makeImportRow(profile, lengthMm, qty, material, massEach){
  const fam = teklaFamily(profile);
  const lenM = num(lengthMm)/1000;
  const kgPerM = (fam.kind==='section' && lenM>0 && num(massEach)>0) ? round4(num(massEach)/lenM) : 0;
  const dims = fam.kind==='plate' ? plateDimsFromProfile(profile) : {t:0,w:0};
  return {
    id: uid(),
    include: true,
    profile: String(profile||'').trim().replace(/\s*\*{2,}\s*$/,'').trim(),
    lengthMm: num(lengthMm),
    qty: num(qty),
    material: String(material||'').trim(),
    massEach: num(massEach),
    massTotal: round4(num(massEach)*num(qty)),
    kind: fam.kind,
    group: fam.label,
    kgPerM,
    plateT: dims.t,
    plateW: dims.w
  };
}
function parseTeklaText(text){
  const lines = String(text||'').split(/\r?\n/);
  const out = { rows:[], project:'', phase:'' };
  // 6 columns: profile, length, no, material, paint area, mass
  const RE6 = /^\s*(\S.*?)\s\s+([\d.]+)\s+(\d+)\s+(\S+)\s+([\d.]+)\s+([\d.]+)\s*$/;
  // 5 columns: profile, length, no, material, mass
  const RE5 = /^\s*(\S.*?)\s\s+([\d.]+)\s+(\d+)\s+(\S+)\s+([\d.]+)\s*$/;
  const headerSeen = [];
  lines.forEach((raw, idx)=>{
    const line = raw.replace(/\f/g,'');
    const t = line.trim();
    if(!t) return;
    if(/^-+$/.test(t)) return;
    if(/profile\s+total/i.test(t)) return;
    if(/^total of/i.test(t)) return;
    if(/^profile\s+length/i.test(t)) return;
    const pageM = t.match(/^(.+?)\s{2,}Page\s+\d+\s*$/i);
    if(pageM){ if(!out.project) out.project = pageM[1].trim(); return; }
    if(/^date\s/i.test(t) || /\bDate\s+\d{2}\.\d{2}\.\d{4}/.test(t)) return;
    if(/^(tekla structures|issued (for|to)|preliminary|site address)/i.test(t)) return;
    let m = line.match(RE6);
    let row = null;
    if(m) row = makeImportRow(m[1], m[2], m[3], m[4], m[6]);
    else {
      m = line.match(RE5);
      if(m) row = makeImportRow(m[1], m[2], m[3], m[4], m[5]);
    }
    if(row && row.profile && row.qty>0) out.rows.push(row);
    else if(!row && idx<12 && !out.phase && /^[A-Z0-9 \-_/&.]+$/.test(t) && t.length<40 && !/ropa/i.test(t)) out.phase = t;
  });
  return out;
}
function detectSheetHeader(aoa){
  const norm = s=>String(s||'').toLowerCase().replace(/[^a-z]/g,'');
  const PROFILE_WORDS = ['profile','section','profilename','sectiontype','sectionname'];
  const LENGTH_WORDS = ['length','lengthmm','cutlength','barlength','partlength'];
  const QTY_WORDS = ['no','qty','quantity','number','nos','pcs','pieces','count'];
  const MATERIAL_WORDS = ['material','grade','steelgrade'];
  const MASS_WORDS = ['mass','weight','masskg','weightkg','masseach','weighteach','unitweight','unitmass'];
  for(let i=0;i<Math.min(aoa.length,80);i++){
    const raw = aoa[i]||[];
    const cells = raw.map(norm);
    const pi = cells.findIndex(c=>PROFILE_WORDS.includes(c));
    if(pi<0) continue;
    const li = cells.findIndex(c=>LENGTH_WORDS.includes(c));
    return {
      hdr:i,
      headers: raw.map(c=>String(c===undefined||c===null?'':c).trim()),
      map:{
        profile: pi,
        length: li,
        qty: cells.findIndex(c=>QTY_WORDS.includes(c)),
        material: cells.findIndex(c=>MATERIAL_WORDS.includes(c)),
        mass: cells.findIndex(c=>MASS_WORDS.includes(c))
      }
    };
  }
  return null;
}
function parseTeklaSheet(aoa){
  const found = detectSheetHeader(aoa);
  if(!found || found.map.length<0){
    // Not a recognisable table - fall back to text parsing of joined rows
    const text = aoa.map(r=>(r||[]).map(c=>c===undefined||c===null?'':String(c)).join('  ')).join('\n');
    return parseTeklaText(text);
  }
  return parseSheetWithMap(aoa, found.hdr, found.map);
}
function parseSheetWithMap(aoa, hdrRow, map){
  const out = { rows:[], project:'', phase:'' };
  for(let i=hdrRow+1;i<aoa.length;i++){
    const r=aoa[i]||[];
    const profile=String(map.profile>=0 && r[map.profile]!==undefined ? r[map.profile] : '').trim();
    if(!profile) continue;
    if(/total/i.test(profile)) continue;
    const qty = map.qty>=0 ? num(r[map.qty]) : 1;
    const len = map.length>=0 ? num(r[map.length]) : 0;
    if(!qty) continue;
    const mass = map.mass>=0 ? num(r[map.mass]) : 0;
    const row = makeImportRow(profile, len, qty, map.material>=0?r[map.material]:'', mass);
    if(row.profile) out.rows.push(row);
  }
  return out;
}
async function readDocxText(file){
  if(typeof JSZip==='undefined') throw new Error('The .docx reader library did not load. Check your internet connection, or save the list as .txt/.xlsx and import that instead.');
  const zip = await JSZip.loadAsync(file);
  const doc = zip.file('word/document.xml');
  if(!doc) throw new Error('That does not look like a Word .docx file.');
  const xml = await doc.async('string');
  // table cells become columns, paragraphs become lines
  return xml
    .replace(/<w:tab[^>]*\/>/g,'  ')
    .replace(/<\/w:tc>/g,'  ')
    .replace(/<\/w:p>/g,'\n')
    .replace(/<\/w:tr>/g,'\n')
    .replace(/<[^>]+>/g,'')
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'");
}
function readFileAsText(file){
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>rej(new Error('Could not read that file.')); r.readAsText(file); });
}
function readFileAsArrayBuffer(file){
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>rej(new Error('Could not read that file.')); r.readAsArrayBuffer(file); });
}
async function handleTeklaFile(file){
  suppressCloudRefresh(30000);
  const name = (file.name||'').toLowerCase();
  let parsed;
  try{
    if(/\.(xlsx|xls)$/.test(name)){
      if(typeof XLSX==='undefined') throw new Error('The Excel reader library did not load. Check your internet connection and try again.');
      const buf = await readFileAsArrayBuffer(file);
      const wb = XLSX.read(buf, {type:'array'});
      let best = { rows:[] };
      wb.SheetNames.forEach(sn=>{
        const aoa = XLSX.utils.sheet_to_json(wb.Sheets[sn], {header:1, raw:true, defval:''});
        const p = parseTeklaSheet(aoa);
        if(p.rows.length > best.rows.length) best = p;
      });
      parsed = best;
    } else if(/\.csv$/.test(name)){
      if(typeof XLSX==='undefined') throw new Error('The Excel reader library did not load. Check your internet connection and try again.');
      const text = await readFileAsText(file);
      const wb = XLSX.read(text, {type:'string'});
      const aoa = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1, raw:true, defval:''});
      parsed = parseTeklaSheet(aoa);
    } else if(/\.docx$/.test(name)){
      parsed = parseTeklaText(await readDocxText(file));
    } else if(/\.doc$/.test(name)){
      throw new Error('Old .doc format is not readable in the browser. Please re-save it as .docx, .txt or .xlsx.');
    } else {
      parsed = parseTeklaText(await readFileAsText(file));
    }
  }catch(err){
    alert((err && err.message) || 'Could not read that file.');
    return;
  }
  if(!parsed.rows.length){
    alert('No material rows were recognised in "'+file.name+'".\n\nExpected a Tekla material list or part list with columns for Profile, Length, No (quantity), Material, and Mass.');
    return;
  }
  importUI.rows = parsed.rows;
  importUI.source = file.name;
  importUI.project = parsed.project||'';
  importUI.phase = parsed.phase||'';
  importUI.mode = 'append';
  importUI.open = true;
  importUI.stage = 'preview';
  renderImportModal();
}

function mergeImportRows(){

    else { map[k].qty += r.qty; map[k].massTotal = round4(map[k].massTotal + r.massTotal); map[k].include = map[k].include || r.include; }
  });

/* Pool every selected plate/flat row by thickness (within the same target group). */
function poolPlatesByThickness(rows){
  const buckets = {};
  rows.forEach(r=>{
    const gname = (r.group||'IMPORTED ITEMS').trim().toUpperCase();
    const t = r.plateT || 0;
    const key = gname+'|'+t;
    const b = buckets[key] || (buckets[key] = { group:gname, t:t, qty:0, mass:0, widths:{}, materials:{} });
    b.qty += r.qty;
    b.mass = round4(b.mass + r.massTotal);
    if(r.plateW) b.widths[r.plateW]=true;
    if(r.material) b.materials[r.material]=true;
  });
  return Object.values(buckets);
}
/* Group every selected section row by profile name (within the same target group), summing all cut lengths into one row. */
function groupProfilesByName(rows){
  const buckets = {};
  rows.forEach(r=>{
    const gname = (r.group||'IMPORTED ITEMS').trim().toUpperCase();
    const key = gname+'|'+r.profile.trim().toUpperCase();
    const b = buckets[key] || (buckets[key] = { group:gname, profile:r.profile, qty:0, lenM:0, mass:0, cuts:0, materials:{} });
    b.qty += r.qty;
    b.lenM = round4(b.lenM + (r.lengthMm/1000)*r.qty);
    b.mass = round4(b.mass + r.massTotal);
    b.cuts += 1;
    if(r.material) b.materials[r.material]=true;
  });
  return Object.values(buckets);
}
function applyImport(){
  const sel = importUI.rows.filter(r=>r.include);
  if(!sel.length){ alert('Nothing selected to import.'); return; }
  if(importUI.mode==='replace' && !confirm('Replace every existing material group with the imported rows? This cannot be undone (export first if unsure).')) return;
  if(importUI.mode==='replace') state.materialGroups = [];

  const ensureGroup = (gname)=>{
    let g = state.materialGroups.find(x=>(x.name||'').trim().toUpperCase()===gname);
    if(!g){ g = { id:uid(), name:gname, rows:[] }; state.materialGroups.push(g); }
    // drop the untouched blank placeholder row a fresh group starts with
    g.rows = g.rows.filter(x=>rowDesc(x) || num(x.nos) || num(x.mass));
    return g;
  };

  const plateRows = sel.filter(r=>r.kind==='plate');
  const sectionRows = sel.filter(r=>r.kind!=='plate');

  if(importUI.plateMode==='pool'){
    poolPlatesByThickness(plateRows).forEach(b=>{
      const g = ensureGroup(b.group);
      const widths = Object.keys(b.widths);
      const materials = Object.keys(b.materials);
      g.rows.push(blankMaterialRow({
        kind:'plate', mode:'custom', category:'plates',
        profile: b.t ? (b.t+'mm PLATE (pooled)') : 'PLATE (pooled)',
        plateT: b.t ? String(b.t) : '',
        plateW: widths.length===1 ? widths[0] : '',
        unitOrderMass:'',
        nos: String(b.qty), unit:'No',
        remarks: 'Pooled '+fmt(b.qty,0)+' pcs, '+fmt(b.mass,1)+' kg total'+
                 (widths.length>1?'; widths: '+widths.join(', ')+'mm':'')+
                 (materials.length?'; Grade '+materials.join('/'):'')
      }));
    });
  } else {
    plateRows.forEach(r=>{
      const g = ensureGroup((r.group||'IMPORTED ITEMS').trim().toUpperCase());
      g.rows.push(blankMaterialRow({
        kind:'plate', mode:'custom', category:'plates',
        profile: r.profile,
        plateL: r.lengthMm ? String(r.lengthMm) : '',
        plateW: r.plateW ? String(r.plateW) : '',
        plateT: r.plateT ? String(r.plateT) : '',
        unitOrderMass: r.massEach ? String(round4(r.massEach)) : '',
        nos: String(r.qty), unit:'No',
        remarks: r.material ? 'Grade '+r.material : ''
      }));
    });
  }

  if(importUI.profileMode==='group'){
    groupProfilesByName(sectionRows).forEach(b=>{
      const g = ensureGroup(b.group);
      const materials = Object.keys(b.materials);
      g.rows.push(blankMaterialRow({
        kind:'section', mode:'custom', category:'UB',
        profile: b.profile,
        nos: '1',
        unitLength: b.lenM ? String(b.lenM) : '',
        kgPerM: (b.lenM>0 && b.mass>0) ? String(round4(b.mass/b.lenM)) : '',
        stdLength: b.lenM > 6 ? '12' : '6',
        unit:'No',
        remarks: fmt(b.qty,0)+' pcs in '+b.cuts+' cut length'+(b.cuts>1?'s':'')+(materials.length?'; Grade '+materials.join('/'):'')
      }));
    });
  } else {
    sectionRows.forEach(r=>{
      const g = ensureGroup((r.group||'IMPORTED ITEMS').trim().toUpperCase());
      const lenM = round4(r.lengthMm/1000);
      g.rows.push(blankMaterialRow({
        kind:'section', mode:'custom', category:'UB',
        profile: r.profile,
        nos: String(r.qty),
        unitLength: lenM ? String(lenM) : '',
        kgPerM: r.kgPerM ? String(r.kgPerM) : '',
        stdLength: lenM > 6 ? '12' : '6',
        unit:'No',
        remarks: r.material ? 'Grade '+r.material : ''
      }));
    });
  }

  state.materialGroups.forEach(g=>{ if(!g.rows.length) g.rows.push(blankMaterialRow()); });
  if(!state.materialGroups.length) state.materialGroups.push(blankGroup('IMPORTED ITEMS'));
  importUI.open=false; renderImportModal();
  saveState(); rerender();
}

/* ================= COUNTER CHECK (Quote PDF vs Tekla) ================= */
function numC(v){ const n=parseFloat(String(v||'').replace(/,/g,'')); return isFinite(n)?n:0; }

async function extractPdfLines(file){
  if(typeof pdfjsLib==='undefined') throw new Error('The PDF reader library did not load. Check your internet connection and try again.');
  if(pdfjsLib.GlobalWorkerOptions && !pdfjsLib.GlobalWorkerOptions.workerSrc){
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
  const buf = await readFileAsArrayBuffer(file);
  const pdf = await pdfjsLib.getDocument({data:buf}).promise;
  const lines=[];
  const Y_TOL = 2.0;      // items within this many PDF units of vertical baseline are treated as the same visual row
  const GAP_THRESHOLD = 6; // a horizontal gap bigger than this (points) signals a new table cell, not a word-space
  for(let p=1;p<=pdf.numPages;p++){
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    // Whitespace-run items report unreliable/stretched widths (justified table columns), which corrupts
    // gap tracking if included - so gaps are measured purely between real content items.
    const items = content.items
      .filter(it=>(it.str||'').trim()!=='')
      .map(it=>({ str: it.str, x: it.transform[4], y: it.transform[5], w: it.width||0 }));
    let curLine='', curY=null, prevEndX=null;
    items.forEach(it=>{
      const sameY = curY!==null && Math.abs(it.y-curY)<=Y_TOL;
      const gap = prevEndX!==null ? (it.x-prevEndX) : 0;
      const continuesLine = sameY && gap<=GAP_THRESHOLD;
      if(!continuesLine){
        if(curLine.trim()) lines.push(curLine.trim());
        curLine = it.str;
      } else {
        curLine += (curLine.trim() ? ' ' : '') + it.str;
      }
      curY = it.y;
      prevEndX = it.x + it.w;
    });
    if(curLine.trim()) lines.push(curLine.trim());
  }
  return lines;
}

const QUOTE_UNIT_RE = /^(Kgs?|SM|LM|No|Item|Sm|Nos|Tonne|Day|L)$/i;
const QUOTE_NUM_RE = /^[\d,]+\.?\d*$/;
const QUOTE_PROFILE_PREFIX_RE = /^(IPE|UB|UC|UKB|UKC|HEA|HEB|HEM|RHS|SHS|CHS|RSA|RSC|RSJ|PFC|Channel|Black\s*Pipes?|Angle|Flat|Plate|PLT|PL\d|LGS|Pipe|Round|ROD|Z\s?\d|Zed|Girder|Purlin)/i;
const QUOTE_SECTION_LABEL_RE = /^(#|DESCRIPTION|PROFILE|DIMENSIONS|KG\/M|UN|QTY|RATE|AMT|NOS|LEN|TOT ?M|STEEL ITEMS|Auxillary|Auxiliary|Paint.*|Clear Area ROOFING)$/i;
const QUOTE_SUMMARY_LABEL_RE = /^(Steel Sub-total|MS Connections.*|Total for Steel|SUB[ -]?TOTAL|ADD 16% VAT|GRAND TOTAL.*)$/i;

function parseQuoteLines(lines){
  let idx=0, currentSheet='';
  const rows=[];
  while(idx<lines.length){
    const line=lines[idx];
    if(/^SHEET\s+\d+/i.test(line)){
      const parts=line.split(/—|-/);
      currentSheet = parts.length>1 ? parts.slice(1).join('-').trim() : line;
      idx++; continue;
    }
    if(QUOTE_SECTION_LABEL_RE.test(line)){ idx++; continue; }
    if(QUOTE_SUMMARY_LABEL_RE.test(line)){ idx+=2; continue; }
    if(/^\d+$/.test(line)){
      const startIdx = idx;
      idx++;
      const buf=[]; let guard=0;
      while(idx<lines.length && !QUOTE_UNIT_RE.test(lines[idx]) && guard<40){ buf.push(lines[idx]); idx++; guard++; }
      if(idx>=lines.length){ idx=startIdx+1; continue; }
      if(!QUOTE_UNIT_RE.test(lines[idx])){
        // Could not find a unit token within a reasonable span - this wasn't a real item row
        // (e.g. a stray number in running text). Don't misparse it; just skip past the row number.
        idx = startIdx+1;
        continue;
      }
      const unit=lines[idx]; idx++;
      const qtyStr=lines[idx]||''; idx++;
      const rateStr=lines[idx]||''; idx++;
      const amtStr=lines[idx]||''; idx++;
      const dims=[];
      while(buf.length && dims.length<4 && QUOTE_NUM_RE.test(buf[buf.length-1])){ dims.unshift(buf.pop()); }
      let nos=0,len=0,totm=0,kgm=0;
      if(dims.length===4){ nos=numC(dims[0]); len=numC(dims[1]); totm=numC(dims[2]); kgm=numC(dims[3]); }
      else if(dims.length===1){ kgm=numC(dims[0]); }
      else if(dims.length>0){
        const order=['nos','len','totm','kgm'].slice(4-dims.length);
        dims.forEach((v,i)=>{ if(order[i]==='nos')nos=numC(v); else if(order[i]==='len')len=numC(v); else if(order[i]==='totm')totm=numC(v); else kgm=numC(v); });
      }
      let profile='', description='', pIdx=-1;
      for(let i=buf.length-1;i>=0;i--){
        if(buf[i]==='—' || buf[i]==='-'){ pIdx=i; break; }
        if(QUOTE_PROFILE_PREFIX_RE.test(buf[i])){ pIdx=i; break; }
      }
      if(pIdx>=0){ profile=buf.slice(pIdx).join(' '); description=buf.slice(0,pIdx).join(' '); }
      else { description=buf.join(' '); }
      if(/^plate\s*x\s*\d+\s*nos?\.?$/i.test(profile.trim())){ description = (description+' '+profile).trim(); profile=''; }
      const unitNorm=(unit||'').toLowerCase();
      const massTotal = /^kgs?$/.test(unitNorm) ? numC(qtyStr) : 0;
      rows.push({ id:uid(), group:currentSheet, profile, description, nos, len, totm, kgm, unit, qty:numC(qtyStr), rate:numC(rateStr), amt:numC(amtStr), massTotal, pieces: nos||0 });
      continue;
    }
    idx++;
  }
  return rows;
}

const CC_SINGLE_DIM_FAMILIES = new Set(['IPE','UB','UC','UKB','UKC','HEA','HEB','HEM','ROD','RB','PIPE','RSJ']);
const CC_FAMILY_ALIAS = { 'C':'CHANNEL','PFC':'CHANNEL','CFLC':'CHANNEL','CFC':'CHANNEL','CLC':'CHANNEL','CHANNEL':'CHANNEL','RSC':'CHANNEL',
  'L':'ANGLE','RSA':'ANGLE','ANGLE':'ANGLE', 'ROD':'ROUND','RB':'ROUND','ROUND':'ROUND',
  'PLT':'PLATE','PL':'PLATE','PLATE':'PLATE','FL':'FLAT','FLAT':'FLAT' };
function normalizeProfileKey(s){
  let t = String(s||'').toUpperCase();
  if(!t.trim() || t==='—' || t==='-') return '';
  t = t.replace(/\(EQUAL\)/g,'').replace(/BLACK\s*PIPES?.*?OD\s*/,'PIPE ');
  const famM = t.match(/[A-Z]+/);
  let family = famM ? famM[0] : 'OTHER';
  family = CC_FAMILY_ALIAS[family] || family;
  const nums = (t.match(/\d+(\.\d+)?/g)||[]).map(n=>String(parseFloat(n)));
  const dimCount = CC_SINGLE_DIM_FAMILIES.has(family) ? 1 : 2;
  const dims = nums.slice(0,dimCount).join('X');
  return family + (dims?('-'+dims):'');
}

async function handleCounterCheckPdf(file){
  suppressCloudRefresh(30000);
  let lines, rows;
  try{
    lines = await extractPdfLines(file);
    rows = parseQuoteLines(lines);
  }catch(err){
    alert((err && err.message) || 'Could not read that PDF.');
    return;
  }
  if(!rows.length){
    alert('No item rows were recognised in "'+file.name+'".\n\nThis reader expects a Ropa-style steel quotation with # / Description / Profile / Dimensions / Kg/m / Un / Qty / Rate / Amt columns.');
    return;
  }
  state.counterCheck.quote.imports.push({ id:uid(), source:file.name, rows });
  saveState(); rerender();
}
async function handleCounterCheckTekla(file){
  suppressCloudRefresh(30000);
  const name=(file.name||'').toLowerCase();
  try{
    if(/\.(xlsx|xls)$/.test(name)){
      if(typeof XLSX==='undefined') throw new Error('The Excel reader library did not load. Check your internet connection and try again.');
      const buf = await readFileAsArrayBuffer(file);
      const wb = XLSX.read(buf, {type:'array'});
      const sheets = wb.SheetNames.map(sn=>({ name:sn, aoa: XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,raw:true,defval:''}) }));
      let best=null, bestIdx=-1;
      sheets.forEach((sh,i)=>{ const p=parseTeklaSheet(sh.aoa); if(!best||p.rows.length>best.rows.length){ best=p; bestIdx=i; } });
      if(best && best.rows.length){
        commitCounterCheckImport('tekla', file.name, best.rows);
      } else {
        openCcMapModal(file.name, sheets);
      }
      return;
    }
    if(/\.csv$/.test(name)){
      if(typeof XLSX==='undefined') throw new Error('The Excel reader library did not load. Check your internet connection and try again.');
      const text = await readFileAsText(file);
      const wb = XLSX.read(text, {type:'string'});
      const sheets = wb.SheetNames.map(sn=>({ name:sn, aoa: XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,raw:true,defval:''}) }));
      const parsed = parseTeklaSheet(sheets[0].aoa);
      if(parsed.rows.length){ commitCounterCheckImport('tekla', file.name, parsed.rows); }
      else { openCcMapModal(file.name, sheets); }
      return;
    }
    let parsed;
    if(/\.docx$/.test(name)){
      parsed = parseTeklaText(await readDocxText(file));
    } else if(/\.doc$/.test(name)){
      throw new Error('Old .doc format is not readable in the browser. Please re-save it as .docx, .txt or .xlsx.');
    } else {
      parsed = parseTeklaText(await readFileAsText(file));
    }
    if(!parsed.rows.length){ alert('No material rows were recognised in "'+file.name+'".'); return; }
    commitCounterCheckImport('tekla', file.name, parsed.rows);
  }catch(err){
    alert((err && err.message) || 'Could not read that file.');
  }
}
function commitCounterCheckImport(side, source, rawRows){
  const rows = rawRows.map(r=>({ id:r.id||uid(), group:r.group, profile:r.profile, massTotal:r.massTotal, pieces:r.qty!==undefined?r.qty:r.pieces, lengthMm:r.lengthMm }));
  state.counterCheck[side].imports.push({ id:uid(), source, rows });
  saveState(); rerender();
}

/* ---- manual column-mapping fallback for spreadsheets the auto-detector can't read ---- */
const ccMapUI = { open:false, fileName:'', sheets:[], sheetIdx:0, map:{profile:-1,length:-1,qty:-1,material:-1,mass:-1} };
function openCcMapModal(fileName, sheets){
  ccMapUI.open = true;
  ccMapUI.fileName = fileName;
  ccMapUI.sheets = sheets;
  // pick the sheet with the most non-empty rows as the initial guess
  let bestIdx=0, bestLen=-1;
  sheets.forEach((s,i)=>{ if(s.aoa.length>bestLen){ bestLen=s.aoa.length; bestIdx=i; } });
  ccMapUI.sheetIdx = bestIdx;
  const guess = detectSheetHeader(sheets[bestIdx].aoa);
  ccMapUI.headerRow = guess ? guess.hdr : 0;
  ccMapUI.map = guess ? Object.assign({profile:-1,length:-1,qty:-1,material:-1,mass:-1}, guess.map) : {profile:-1,length:-1,qty:-1,material:-1,mass:-1};

function ccAllRows(side){
  const imports = (state.counterCheck[side]||{}).imports || [];
  return imports.reduce((acc,im)=>acc.concat((im.rows||[]).map(r=>Object.assign({},r,{__source:im.source}))),[]);
}
function ccTotals(side){
  const rows = ccAllRows(side);
  return { count: rows.length, mass: rows.reduce((s,r)=>s+num(r.massTotal),0), pieces: rows.reduce((s,r)=>s+num(r.pieces),0) };
}
function buildCounterCheckComparison(){
  const quoteRows = ccAllRows('quote');
  const teklaRows = ccAllRows('tekla');
  const map = {};
  quoteRows.forEach(r=>{
    const key = normalizeProfileKey(r.profile) || ('DESC:'+(r.description||'').trim().toUpperCase().slice(0,40));
    if(!map[key]) map[key] = { key, quoteMass:0, quotePieces:0, quoteLabels:new Set(), teklaMass:0, teklaPieces:0, teklaLabels:new Set() };
    map[key].quoteMass += num(r.massTotal);
    map[key].quotePieces += num(r.pieces);
    map[key].quoteLabels.add((r.profile||'').trim() || (r.description||'').trim().slice(0,40));
  });
  teklaRows.forEach(r=>{
    const key = normalizeProfileKey(r.profile) || ('OTHER:'+(r.profile||'').trim());
    if(!map[key]) map[key] = { key, quoteMass:0, quotePieces:0, quoteLabels:new Set(), teklaMass:0, teklaPieces:0, teklaLabels:new Set() };
    map[key].teklaMass += num(r.massTotal);
    map[key].teklaPieces += num(r.pieces);
    map[key].teklaLabels.add((r.profile||'').trim());
  });
  const list = Object.values(map).map(row=>{
    const diff = row.quoteMass - row.teklaMass;
    const base = Math.max(row.quoteMass, row.teklaMass, 1);
    const diffPct = (diff/base)*100;
    let status;
    if(row.quoteMass>0 && row.teklaMass===0) status='quote-only';
    else if(row.teklaMass>0 && row.quoteMass===0) status='tekla-only';
    else if(Math.abs(diffPct)<=3) status='match';
    else if(Math.abs(diffPct)<=10) status='warn';
    else status='bad';
    return Object.assign(row,{diff,diffPct,status});
  });
  list.sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));
  return list;
}
function ccBadge(status){
  const map = { match:['ok','Match'], warn:['warn','Check'], bad:['bad','Mismatch'], 'quote-only':['only','Quote only'], 'tekla-only':['only','Tekla only'] };
  const [cls,label] = map[status]||['only',status];
  return '<span class="cc-badge '+cls+'">'+label+'</span>';
}
function ccImportListHtml(side){
  const imports = (state.counterCheck[side]||{}).imports || [];

}

  }

  const comparison = buildCounterCheckComparison();

  const flagged = comparison.filter(r=>r.status==='bad'||r.status==='warn'||r.status==='quote-only'||r.status==='tekla-only').length;

  const rowsHtml = comparison.map(r=>{

    return '<tr><td><b>'+esc(r.key)+'</b>'+(qLabels?'<span class="cc-src">Quote: '+esc(qLabels)+'</span>':'')+(tLabels?'<span class="cc-src">Tekla: '+esc(tLabels)+'</span>':'')+'</td>'+
      '<td class="n">'+(r.quoteMass?fmt(r.quoteMass,1):'-')+'</td>'+

      '<td class="n">'+(r.diff?((r.diff>0?'+':'')+fmt(r.diff,1)):'-')+'</td>'+

      '<td>'+ccBadge(r.status)+'</td></tr>';
  }).join('');

  return '<div class="card"><div class="card-head"><h2>Counter Check</h2></div><div class="pitch">Import a quote (as sent to the client) and the Tekla material take-off for the same structure side by side. Add as many files as you need to either side - they combine before comparing. Matching is by profile family and primary dimension, so treat this as a sanity check on total mass per profile, not a line-by-line audit.</div>'+sides+

    case 'add-general-group': (state.generalGroups=state.generalGroups||[]).push(blankGeneralGroup('NEW ITEM GROUP')); saveState(); rerender(); break;
    case 'remove-general-group': if(confirm('Remove this item group?')){ state.generalGroups=(state.generalGroups||[]).filter(g=>g.id!==ds.ggroup); saveState(); rerender(); } break;
    case 'add-general-row': { const g=(state.generalGroups||[]).find(x=>x.id===ds.ggroup); if(g) g.rows.push(blankGeneralRow()); saveState(); rerender(); break; }
    case 'remove-general-row': { const g=(state.generalGroups||[]).find(x=>x.id===ds.ggroup); if(g){ g.rows.splice(+ds.grow,1); if(!g.rows.length) g.rows.push(blankGeneralRow()); } saveState(); rerender(); break; }
    /* installer requisition */
    case 'add-ins-item': (state.installer.items=state.installer.items||[]).push(blankInstallerItem()); saveState(); rerender(); break;
    case 'remove-ins-item': { const ins=state.installer; ins.items=(ins.items||[]).filter(r=>r.id!==ds.id); if(!ins.items.length) ins.items.push(blankInstallerItem()); saveState(); rerender(); break; }
    case 'add-ins-ded': (state.installer.deductions=state.installer.deductions||[]).push(blankInstallerDeduction()); saveState(); rerender(); break;
    case 'remove-ins-ded': state.installer.deductions=(state.installer.deductions||[]).filter(d=>d.id!==ds.id); saveState(); rerender(); break;
    case 'print-installer':
      if(!state.installer || !state.installer.enabled){ alert('Switch on "Include in this requisition" in the Installer / Subcontractor card first.'); break; }
      doPrint('installer'); break;
    /* Tekla import modal */
    case 'close-import': importUI.open=false; importUI.stage='picker'; renderImportModal(); break;
    case 'imp-all': importUI.rows.forEach(r=>r.include=true); renderImportModal(); break;
    case 'imp-none': importUI.rows.forEach(r=>r.include=false); renderImportModal(); break;
    case 'imp-merge': mergeImportRows(); renderImportModal(); break;
    case 'imp-useproject': if(importUI.project){ state.meta.project=importUI.project; saveState(); rerender(); renderImportModal(); } break;
    case 'apply-import': applyImport(); break;
    case 'open-import': importUI.open=true; importUI.stage='picker'; renderImportModal(); break;
    case 'import-tab': importUI.tab=ds.tab; renderImportModal(); break;
    case 'import-back': importUI.stage='picker'; importUI.rows=[]; renderImportModal(); break;
  }
});

function round2(n){ return Math.round((n+Number.EPSILON)*100)/100; }
function buildWorkbook(){
  const m = state.meta;
  const showStock=!!m.printStock, showElCols=!!m.printElementCols;
  const wb = XLSX.utils.book_new();

  // Sheet 1: Material Requisition
  const ws1 = [];
  ws1.push(['ROPA ENGINEERING - MATERIAL REQUISITION']);
  ws1.push(['Requisition No:', m.refNo||'-', '', 'Date:', m.date||'-']);
  ws1.push(['Project:', m.project||'-']);
  ws1.push(['Client:', m.client||'-', '', 'Location:', m.location||'-']);
  ws1.push([]);
  const header1 = ['No','Section / Profile'];
  if(showElCols) header1.push('Element Qty','Element Length');
  header1.push('T-Length','T-Mass','Std Order Length','Bars Reqd','Unit');
  if(showStock) header1.push('Available in Stock');
  header1.push('Qty to Order');
  ws1.push(header1);
  state.materialGroups.forEach(g=>{
    const rows = g.rows.filter(r=>rowDesc(r) && r.print!==false);
    if(!rows.length) return;
    ws1.push([g.name]);
    rows.forEach((r,i)=>{
      const isPlate = r.kind==='plate';
      const elemQty = isPlate ? (r.qty?num(r.qty):'') : (r.nos||'');
      const elemLen = isPlate ? (plateUnitMass(r)?round2(plateUnitMass(r)):'') : (r.unitLength||'');
      const row = [i+1, rowDesc(r)];
      if(showElCols) row.push(elemQty, elemLen);
      row.push(isPlate ? num(r.mass)||'' : num(r.totalLength)||'', num(r.mass)||'', isPlate?'':(r.stdLength||''), isPlate?'':(r.barsToOrder||''), normUnit(r.unit));
      if(showStock) row.push(r.avail||'');
      row.push(r.orderQty||'');
      ws1.push(row);
    });
    ws1.push(['','Group total mass (kg):', groupMassTotal(g,true) ? round2(groupMassTotal(g,true)) : '']);
    ws1.push([]);
  });
  ws1.push(['','Grand Total Mass (kg):', round2(grandMassTotal(true))]);
  const sheet1 = XLSX.utils.aoa_to_sheet(ws1);
  XLSX.utils.book_append_sheet(wb, sheet1, 'Material Requisition');

  // Sheet 2: General Items / Accessories
  const genGroups = (state.generalGroups||[]).filter(g=>g.rows.some(r=>(r.desc||'').trim()));
  if(genGroups.length){
    const ws2 = [['GENERAL ITEMS / ACCESSORIES'],[],['No','Item Description','Qty','Unit','Remarks']];
    genGroups.forEach(g=>{
      const rows = g.rows.filter(r=>(r.desc||'').trim() && r.print!==false);
      ws2.push([g.name]);
      rows.forEach((r,i)=> ws2.push([i+1, r.desc, r.qty||'', r.unit||'No', r.remarks||'']));
      ws2.push([]);
    });
    const sheet2 = XLSX.utils.aoa_to_sheet(ws2);
    XLSX.utils.book_append_sheet(wb, sheet2, 'General Items');
  }

  // Sheet 3: Paint Procurement Summary
  const paintRows = paintProcurementRows(true);
  if(paintRows.length){
    const ws3 = [['PAINT PROCUREMENT SUMMARY'],[],['Item','Category','Product','Total Liquid (L)','Paint 80% (L)','Thinner 20% (L)','Can Size (L)','Cans to Order']];
    paintRows.forEach(r=> ws3.push([r.item, r.cat, r.type, round2(r.liters), round2(r.paintOnly), round2(r.thinner), r.can, r.cans]));
    const totalThinner = paintRows.reduce((s,r)=>s+r.thinner,0);
    const thinnerCans = ceilSafe(totalThinner/THINNER_CAN_L);
    ws3.push([]);
    ws3.push(['','','Totals','', '', round2(totalThinner), THINNER_CAN_L+'L can', thinnerCans+' thinner cans']);
    const sheet3 = XLSX.utils.aoa_to_sheet(ws3);
    XLSX.utils.book_append_sheet(wb, sheet3, 'Paint Procurement');
  }

  // Sheet 4: Installer / Subcontractor payment requisition
  const ins = state.installer;
  if(ins && ins.enabled){
    const c = installerCalc(true);
    const ws4 = [];
    ws4.push(['SUBCONTRACTOR PAYMENT REQUISITION FORM']);
    ws4.push([]);
    ws4.push(['Date of Requisition:', '', ins.date||'-']);
    ws4.push(['Subcontractor Name:', '', ins.subName||'-']);
    ws4.push(['Trade / Discipline:', '', ins.trade||'-']);
    ws4.push(['Scope of Work:', '', ins.scope||'-']);
    ws4.push(['Project:', '', m.project||'-', '', 'Site:', m.location||'-']);
    ws4.push([]);
    ws4.push(['WORK DONE DETAILS']);
    ws4.push(['Item No.','Description of Work','Unit','Total Qty','Qty Done','Rate (Ksh)','% Complete','Value Done (Ksh)']);
    c.items.filter(r=>(r.desc||'').trim() || r.totalQty || r.rate).forEach((r,i)=>{
      ws4.push([i+1, r.desc, r.unit, r.totalQty||'', r.qtyDone||'', r.rate||'', round2(r.pct), round2(r.valueDone)]);
    });
    ws4.push(['','','','','','Contract amount', '', round2(c.contractAmount)]);
    ws4.push([]);
    ws4.push(['PAYMENT CALCULATION']);
    ws4.push(['A','','Gross value of work done ('+(ins.basis==='contract'?'% of contract sum':'measured')+'):','','', round2(c.gross)]);
    if(c.retentionPct) ws4.push(['B','','Less retention @ '+round2(c.retentionPct)+'%:','','', round2(c.retention)]);
    (ins.deductions||[]).filter(d=>((d.desc||'').trim()||num(d.amount)) && d.print!==false).forEach((d,i)=>{
      ws4.push([String.fromCharCode(67+i),'','Less: '+(d.desc||'Deduction'),'','', round2(num(d.amount))]);
    });
    ws4.push(['','','Total deductions:','','', round2(c.deductions)]);
    ws4.push(['','','NET AMOUNT PAYABLE as at '+(ins.date||'-')+':','','', round2(c.net)]);
    ws4.push([]);
    if(ins.note) ws4.push(['NB', ins.note]);
    ws4.push([]);
    ws4.push(['PREPARED BY:', ins.preparedBy||'Dennis Kihiu']);
    ws4.push(['APPROVED BY:', ins.approvedBy||'']);
    const sheet4 = XLSX.utils.aoa_to_sheet(ws4);
    XLSX.utils.book_append_sheet(wb, sheet4, 'Installer Requisition');
  }

  return wb;
}
